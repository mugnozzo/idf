<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDF Manager</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./style.css" />
    <script src="./api.js" defer></script>
    <script src="./main.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Personal system</p>
          <h1>IDF Manager</h1>
          <p class="subtitle">A calmer interface for collecting and browsing your elements.</p>
        </div>

        <div class="topbar-actions">
          <button id="refresh-button" class="secondary-button" type="button">Refresh</button>
        </div>
      </header>

      <section id="global-feedback" class="global-feedback hidden" aria-live="polite"></section>

      <div class="layout">
        <aside class="sidebar">
          <section class="panel">
            <div class="panel-header">
              <h2>Create element</h2>
              <p>Fast capture with meaningful fields.</p>
            </div>

            <form id="create-element-form" class="stacked-form">
              <label for="element-name">Name</label>
              <input
                id="element-name"
                name="name"
                type="text"
                placeholder="Write a title or short description"
                maxlength="255"
                required
              />

              <label for="element-type">Type</label>
              <select id="element-type" name="type" required></select>

              <label for="element-status">Status</label>
              <select id="element-status" name="status" required></select>

              <label for="element-tags">Tags</label>
              <select id="element-tags" name="tags" multiple size="6"></select>
              <p class="field-help">Hold Ctrl or Cmd to select multiple tags.</p>

              <button id="create-element-button" type="submit">Create element</button>
            </form>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2>Filters</h2>
              <p>Reduce noise and browse faster.</p>
            </div>

            <form id="filters-form" class="stacked-form">
              <label for="search-input">Search</label>
              <input
                id="search-input"
                name="search"
                type="search"
                placeholder="Search by name"
                autocomplete="off"
              />

              <label for="filter-type">Type</label>
              <select id="filter-type" name="filter-type">
                <option value="">All types</option>
              </select>

              <label for="filter-status">Status</label>
              <select id="filter-status" name="filter-status">
                <option value="">All statuses</option>
              </select>

              <label for="filter-tag">Tag</label>
              <select id="filter-tag" name="filter-tag">
                <option value="">All tags</option>
              </select>

              <button id="clear-filters-button" class="secondary-button" type="button">Clear filters</button>
            </form>
          </section>
        </aside>

        <section class="content">
          <div class="content-toolbar">
            <div>
              <h2>Elements</h2>
              <p id="results-summary" class="muted">Loading…</p>
            </div>
          </div>

          <div id="elements-list" class="cards" aria-live="polite"></div>
        </section>
      </div>
    </main>
  </body>
</html>
