<!DOCTYPE html>
<html>
  <head>
    <title>Users</title>
    <link rel="icon" href="data:,"/>
    <link rel="stylesheet" href="./style.css"/>
    <script src="api.js" defer></script>
    <script src="main.js" defer></script>
  </head>
  <body>
    <main>
    <h1>User Manager</h1>

      <div class="main-sections">

        <section id="post-elements-section">
          <h2>Post Elements</h2>
          <input id="post-elements-name" placeholder="name" type="text" /><br/>
          <input id="post-elements-type" placeholder="type" type="number" min="1" /><br/>
          <input id="post-elements-status" placeholder="status" type="number" min="1" /><br/>
          <button id="post-elements-button">Post element</button>
          <div id="post-elements-result"></div>
        </section>

        <section id="get-types-section">
          <h2>Get types</h2>
          <button id="get-types-button" class="get-button" data-endpoint="types" data-result="get-types-result">Get types</button>
          <div id="get-types-result"></div>
        </section>

        <section id="get-statuses-section">
          <h2>Get statuses</h2>
          <button id="get-statuses-button" class="get-button" data-endpoint="statuses" data-result="get-statuses-result">Get statuses</button>
          <div id="get-statuses-result"></div>
        </section>

        <section id="get-tags-section">
          <h2>Get tags</h2>
          <button id="get-tags-button" class="get-button" data-endpoint="tags" data-result="get-tags-result">Get tags</button>
          <div id="get-tags-result"></div>
        </section>

        <section id="get-elements-section">
          <h2>Get Elements</h2>
          <button id="get-elements-button" class="get-button" data-endpoint="elements" data-result="get-elements-result">Get elements</button>
          <div id="get-elements-result"></div>
        </section>

      </div>
    </main>
  </body>
</html>
